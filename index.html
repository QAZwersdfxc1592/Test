<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俄罗斯方块 - Tetris</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">TETRIS</h1>
      <p class="game-subtitle">俄罗斯方块</p>
    </div>

    <div class="game-main">
      <div class="game-left">
        <div class="game-board-wrapper">
          <canvas id="gameCanvas" width="300" height="600"></canvas>
          <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
              <h2 id="overlayTitle">准备开始</h2>
              <p id="overlayMessage">按下开始按钮或空格键开始游戏</p>
            </div>
          </div>
        </div>

        <div class="control-panel">
          <button id="startBtn" class="btn btn-primary">开始游戏</button>
          <button id="pauseBtn" class="btn btn-secondary" disabled>暂停</button>
          <button id="resetBtn" class="btn btn-tertiary">重新开始</button>
        </div>
      </div>

      <div class="game-sidebar">
        <div class="info-panel">
          <div class="info-block">
            <span class="info-label">分数</span>
            <span class="info-value" id="scoreValue">0</span>
          </div>
          <div class="info-block">
            <span class="info-label">等级</span>
            <span class="info-value" id="levelValue">1</span>
          </div>
          <div class="info-block">
            <span class="info-label">行数</span>
            <span class="info-value" id="linesValue">0</span>
          </div>
        </div>

        <div class="next-piece-panel">
          <span class="panel-title">下一个</span>
          <canvas id="nextCanvas" width="120" height="120"></canvas>
        </div>

        <div class="help-panel">
          <span class="panel-title">操作说明</span>
          <div class="help-item"><span class="key">←→</span> 左右移动</div>
          <div class="help-item"><span class="key">↑</span> 旋转方块</div>
          <div class="help-item"><span class="key">↓</span> 加速下落</div>
          <div class="help-item"><span class="key">空格</span> 直接落底</div>
          <div class="help-item"><span class="key">P</span> 暂停/继续</div>
        </div>
      </div>
    </div>

    <div class="mobile-controls">
      <div class="mobile-row">
        <button class="mobile-btn" id="rotateBtn">↻</button>
      </div>
      <div class="mobile-row">
        <button class="mobile-btn" id="leftBtn">←</button>
        <button class="mobile-btn" id="downBtn">↓</button>
        <button class="mobile-btn" id="rightBtn">→</button>
      </div>
      <div class="mobile-row">
        <button class="mobile-btn mobile-btn-wide" id="dropBtn">落底</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
